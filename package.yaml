name:                hsgg
version:             0.1.0.0
github:              "githubuser/hsgg"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/hsgg#readme>

dependencies:
- base >= 4.7 && < 5
- bytestring
- containers
- mtl
- text

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Z80
  - Z80.Types
  - Z80.Asm
  - Z80.Opcodes
  - Z80.Encoder
  - Z80.Linker
  - GameGear
  - GameGear.ROM
  - GameGear.VDP
  - GameGear.PSG
  - GameGear.Music
  - GameGear.Sym

executables:
  hsgg-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hsgg

tests:
  hsgg-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hsgg
    - hspec
    - hspec-discover
    - QuickCheck
    - aeson
    - base64-bytestring
    - network
    - process
    - directory
    - filepath
    - unix
